[pytest]
testpaths = tests
python_files = tests/*.py
python_classes = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

markers =
    slow: slow running tests (skip with -m "not slow")

# 运行测试的命令行参数
addopts = -v --tb=short
