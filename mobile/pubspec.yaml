name: growth_assistant
description: "Personal Growth Assistant - 个人成长管理助手"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # Secure storage
  flutter_secure_storage: ^9.2.0

  # Markdown rendering
  flutter_markdown: ^0.7.0

  # Internationalization & date formatting
  intl: ^0.19.0
  uuid: ^4.5.3
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
