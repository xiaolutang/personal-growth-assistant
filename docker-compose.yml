services:
  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pga-backend
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - QDRANT_URL=http://qdrant:6333
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-glm-5}
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j
      - qdrant
    networks:
      - pga-network
      - proxy-network

  # Neo4j 知识图谱数据库
  neo4j:
    image: neo4j:5-community
    container_name: pga-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "17474:7474"  # HTTP (避免与本地端口冲突)
      - "17687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - pga-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pga-qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"  # HTTP API (避免与本地端口冲突)
      - "16334:6334"  # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - pga-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pga-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - pga-network

networks:
  pga-network:
    driver: bridge
  proxy-network:
    name: proxy-server_proxy-network
    external: true

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
