# 开发环境 Docker Compose 配置
# 使用方式: docker compose -f docker/docker-compose.dev.yml up -d

services:
  # 后端 API 服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: pga-backend-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ../data:/app/data
      - ../backend/app:/app/app:ro  # 开发环境挂载代码，支持热重载
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - pga-network

  # Neo4j 知识图谱数据库
  neo4j:
    image: neo4j:5-community
    container_name: pga-neo4j-dev
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "17474:7474"  # HTTP (避免与本地端口冲突)
      - "17687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - pga-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pga-qdrant-dev
    restart: unless-stopped
    ports:
      - "16333:6333"  # HTTP API (避免与本地端口冲突)
      - "16334:6334"  # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - pga-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pga-nginx-dev
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - pga-network

networks:
  pga-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
