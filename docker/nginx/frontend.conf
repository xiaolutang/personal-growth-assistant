server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location ${FRONTEND_BASE_PATH} {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ ${FRONTEND_BASE_PATH}index.html;
    }

    location = / {
        return 301 ${FRONTEND_BASE_PATH};
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
