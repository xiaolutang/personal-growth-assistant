# 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker/docker-compose.prod.yml up -d
# 依赖: infrastructure/ 层的 Traefik + 共享数据库 + log-service

services:
  # 后端 API 服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: pga-backend:${VERSION:-latest}
    container_name: pga-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme123}
      - QDRANT_URL=http://qdrant:6333
      - LOG_SERVICE_URL=http://log-service:8001
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-personal-growth-assistant}
    volumes:
      - ../data:/app/data
    networks:
      - gateway
      - infra-network
    labels:
      - "traefik.enable=true"
      # API 路由（高优先级）: /growth/api/* → StripPrefix /growth/api → backend:8001
      - "traefik.http.routers.pga-api.rule=PathPrefix(`/growth/api/`)"
      - "traefik.http.routers.pga-api.priority=100"
      - "traefik.http.routers.pga-api.entrypoints=web"
      - "traefik.http.routers.pga-api.middlewares=pga-strip"
      - "traefik.http.middlewares.pga-strip.stripprefix.prefixes=/growth/api"
      - "traefik.http.routers.pga-api.service=pga-backend"
      # Service 端口
      - "traefik.http.services.pga-backend.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端静态文件服务（nginx + SPA 回退）
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - FRONTEND_BASE_PATH=${FRONTEND_BASE_PATH:-/growth/}
    image: pga-frontend:${VERSION:-latest}
    container_name: pga-frontend
    restart: unless-stopped
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      # 前端路由（低优先级）: /growth/* → frontend:80
      - "traefik.http.routers.pga-frontend.rule=PathPrefix(`/growth/`)"
      - "traefik.http.routers.pga-frontend.priority=50"
      - "traefik.http.routers.pga-frontend.entrypoints=web"
      - "traefik.http.routers.pga-frontend.service=pga-frontend"
      # Service 端口
      - "traefik.http.services.pga-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gateway:
    external: true
  infra-network:
    external: true
