# 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker/docker-compose.prod.yml up -d

services:
  # 后端 API 服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: pga-backend:${VERSION:-latest}
    container_name: pga-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      - ROOT_PATH=${FRONTEND_BASE_PATH:-/growth/}api
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ../data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - pga-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Neo4j 知识图谱数据库
  neo4j:
    image: neo4j:5-community
    container_name: pga-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - pga-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pga-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - pga-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pga-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - FRONTEND_BASE_PATH=${FRONTEND_BASE_PATH:-/growth/}
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/templates:/etc/nginx/templates:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - logs-ui-dist:/usr/share/nginx/logs-ui:ro
      - nginx-confd:/etc/nginx/conf.d  # 使用 volume 覆盖默认配置
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pga-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端构建服务（一次性运行）
  frontend-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - FRONTEND_BASE_PATH=${FRONTEND_BASE_PATH:-/growth/}
    volumes:
      - frontend-dist:/usr/share/nginx/html

  # 日志 UI 构建服务（一次性运行）
  logs-ui-builder:
    build:
      context: ../logs-ui
      dockerfile: Dockerfile
    volumes:
      - logs-ui-dist:/usr/share/nginx/html

networks:
  pga-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  frontend-dist:
  logs-ui-dist:
  nginx-confd:
