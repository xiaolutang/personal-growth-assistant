name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/unit/ -v --tb=short

  # 前端测试
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # Docker 构建测试（集成测试）
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t pga-backend:test .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t pga-frontend:test .

      - name: Test backend health
        run: |
          docker run -d --name backend-test -p 8001:8001 \
            -e LLM_API_KEY=test \
            -e LLM_BASE_URL=http://localhost \
            -e LLM_MODEL=test \
            pga-backend:test
          sleep 10
          curl -f http://localhost:8001/health || exit 1
          docker stop backend-test
          docker rm backend-test
