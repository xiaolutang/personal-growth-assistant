name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/unit/ -v --tb=short

  # 前端测试
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # Docker 构建测试（集成测试）
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build single-container image
        run: bash deploy/build.sh

      - name: Test container health
        run: |
          docker run -d --name pga-test -p 8001:8001 \
            -v $PWD/data:/app/data \
            -e DATA_DIR=/app/data \
            -e LLM_API_KEY=test \
            -e LLM_BASE_URL=http://localhost \
            -e LLM_MODEL=test \
            personal-growth-assistant:latest
          sleep 10
          # API health
          curl -f http://localhost:8001/health || exit 1
          # Frontend page
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:8001/ | grep -q 200 || exit 1
          # SPA deep link (returns HTML, not 404)
          SPA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/tasks)
          [ "$SPA_STATUS" = "200" ] || (echo "SPA deep link /tasks returned $SPA_STATUS" && exit 1)
          SPA_CT=$(curl -sI http://localhost:8001/tasks | grep -i content-type)
          echo "$SPA_CT" | grep -q "text/html" || (echo "/tasks not HTML: $SPA_CT" && exit 1)
          # Route isolation (/health returns JSON)
          HEALTH_CT=$(curl -sI http://localhost:8001/health | grep -i content-type)
          echo "$HEALTH_CT" | grep -q "application/json" || (echo "/health not JSON: $HEALTH_CT" && exit 1)
          docker stop pga-test
          docker rm pga-test

  # E2E 关键子集（PR 时运行）
  e2e-test-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd ../backend && uv sync

      - name: Install frontend dependencies
        run: cd ../frontend && npm ci

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E critical subset
        run: npx playwright test tests/auth.spec.ts tests/entries.spec.ts tests/goals-api.spec.ts tests/new-types-api.spec.ts --workers=1
        env:
          CI: true

  # E2E 全量测试（仅 main 分支推送）
  e2e-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd ../backend && uv sync

      - name: Install frontend dependencies
        run: cd ../frontend && npm ci

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --workers=1
        env:
          CI: true
